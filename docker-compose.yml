services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_DB:-family_chat}
      - DB_USERNAME=${POSTGRES_USER:-family_chat_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-family_chat}
      - POSTGRES_USER=${POSTGRES_USER:-family_chat_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-family_chat_user} -d ${POSTGRES_DB:-family_chat}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
